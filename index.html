<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>DUNUKHA</title>

<link
rel="stylesheet"
href="./style.css">

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<div class="phone-preview">

<img
src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=600"
alt="preview">

</div>

<div class="login-box">

<h1 class="logo">
🌱 DUNUKHA
</h1>

<input
id="email"
type="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Mật khẩu">

<button onclick="register()">
Đăng ký
</button>

<button onclick="login()">
Đăng nhập
</button>

<div id="authStatus">
❌ Chưa đăng nhập
</div>

</div>

</div>

<!-- APP -->

<div
id="appPage"
style="display:none">

<!-- TOPBAR -->

<header class="topbar">

<div class="top-logo">
🌱 DUNUKHA
</div>

<div class="top-actions">

<button
class="small-btn"
onclick="logoutUser()">

Đăng xuất

</button>

</div>

</header>

<!-- STORIES -->

<div class="stories">

<div class="story">🌱</div>
<div class="story">🚀</div>
<div class="story">🔥</div>
<div class="story">🌌</div>
<div class="story">✨</div>
<div class="story">💎</div>
<div class="story">🌍</div>

</div>

<!-- MAIN -->

<div class="main-layout">

<!-- LEFT -->

<div class="left-column">

<!-- PROFILE -->

<div class="card">

<h2>
👤 Hồ sơ
</h2>

<div class="avatar-big">
🌱
</div>

<input
id="nickname"
placeholder="Nickname">

<textarea
id="bio"
placeholder="Giới thiệu bản thân">
</textarea>

<button
onclick="saveProfile()">

Lưu hồ sơ

</button>

</div>

<!-- CREATE POST -->

<div class="card">

<h2>
➕ Đăng bài
</h2>

<input
id="imageUrl"
placeholder="Link ảnh">

<textarea
id="caption"
placeholder="Bạn đang nghĩ gì?">
</textarea>

<button
onclick="createPost()">

Đăng bài

</button>

</div>

<!-- FEED -->

<div id="feed">

</div>

</div>

<!-- RIGHT -->

<div class="right-column">

<!-- USERS -->

<div class="card">

<h2>
👥 Người dùng
</h2>

<div id="usersList">

Đang tải...

</div>

</div>

<!-- PROFILE VIEW -->

<div class="card">

<h2>
🔍 Xem hồ sơ
</h2>

<div id="viewProfile">

Chọn người dùng để xem

</div>

</div>

<!-- CHAT -->

<div class="card">

<h2>
💬 Tin nhắn
</h2>

<div id="chatBox">

Chọn người để chat

</div>

<textarea
id="messageInput"
placeholder="Nhập tin nhắn...">
</textarea>

<button
onclick="sendMessage()">

Gửi tin nhắn

</button>

</div>

</div>

</div>

</div>

<script
type="module"
src="./firebase.js">
</script>

<script
type="module"
src="./app.js">
</script>

</body>

</html>
