<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>DUNUKHA</title><link rel="stylesheet" href="./style.css"></head>
<body><header class="header"><div class="logo">
🌱 DUNUKHA
</div><div id="authStatus" class="status">
❌ Chưa đăng nhập
</div></header><div class="container"><!-- AUTH --><div class="card"><h2>🔐 Tài khoản</h2><input
id="email"
type="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Mật khẩu">

<button onclick="register()">
Đăng ký
</button><button onclick="login()">
Đăng nhập
</button><button onclick="logoutUser()">
Đăng xuất
</button></div><!-- PROFILE --><div class="card"><h2>👤 Hồ sơ</h2><input
id="nickname"
placeholder="Nickname">

<input
id="avatar"
placeholder="Avatar 🌱">

<textarea
id="bio"
rows="3"
placeholder="Giới thiệu bản thân">
</textarea><button onclick="saveProfile()">
Lưu hồ sơ
</button></div><!-- CHAT --><div class="card"><h2>💬 Tin nhắn</h2><div id="usersList">Chưa có người dùng

</div></div><!-- CHAT BOX --><div class="card"><h2>📨 Trò chuyện</h2><div id="chatMessages">Chọn người để nhắn tin

</div><textarea
id="messageInput"
rows="3"
placeholder="Nhập tin nhắn...">
</textarea><button onclick="sendMessage()">
Gửi tin nhắn
</button></div></div><script type="module" src="./firebase.js"></script><script type="module" src="./auth.js"></script><script type="module" src="./profile.js"></script><script type="module" src="./chat.js"></script></body>
</html>
