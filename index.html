<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dunukha</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <div id="login-screen">
    <!-- Logo Dunukha tự vẽ -->
    <div class="logo-text"><span>D</span>unukha</div>
    <button id="google-login"><i class="fab fa-google"></i> Đăng nhập với Google</button>
  </div>

  <div id="app">
    <div class="header">
      <!-- Logo Dunukha ở header -->
      <div class="logo-text"><span>D</span>unukha</div>
      <div class="icons">
        <i class="far fa-plus-square" id="btn-add-post" title="Đăng bài"></i>
        <i class="far fa-heart"></i>
      </div>
    </div>

    <div class="stories" id="stories-container">
      <div class="story" id="story-yourself" style="display:none;">
        <div class="avatar-ring"><img class="avatar" id="your-avatar" /></div>
        <span>Bạn</span>
      </div>
    </div>

    <div class="feed" id="feed-container"></div>

    <div class="navbar">
      <i class="fas fa-home active"></i>
      <i class="far fa-search"></i>
      <i class="far fa-plus-square" id="btn-add-post-mobile"></i>
      <i class="far fa-heart"></i>
      <i class="far fa-user-circle" id="btn-profile"></i>
    </div>
  </div>

  <div class="modal" id="post-modal">
    <div class="modal-content">
      <h3>Tạo bài viết mới</h3>
      <input type="text" id="post-image-url" placeholder="Link ảnh (dán URL ảnh online)">
      <textarea id="post-caption" placeholder="Viết caption..."></textarea>
      <div style="display:flex; gap:10px;">
        <button id="btn-submit-post">Đăng</button>
        <button style="background:#ed4956;" id="btn-close-modal">Hủy</button>
      </div>
    </div>
  </div>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
