<!DOCTYPE html><html lang="vi">
<head>

<title>DUNUKHA</title><style>
*{
margin:0;
padding:0;

}

body{
background:#111827;

.header{
background:#1f2937;

.logo{

.container{

.profile{

.card{
background:#1f2937;

}

padding:12px;

button{
background:#10b981;

margin-top:10px;

}

.post{
background:#1f2937;
padding:15px;

}

.reactions{
